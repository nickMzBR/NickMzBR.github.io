<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala do passado</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  display: flex;
  height: 100vh;
  background: #313338;
  color: #fff;
}

/* Sidebar servidores */
.servers {
  width: 70px;
  background: #1e1f22;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0;
  gap: 10px;
}

.server {
  width: 45px;
  height: 45px;
  background: #5865f2;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-weight: bold;
}

/* Canais */
.channels {
  width: 220px;
  background: #2b2d31;
  padding: 15px;
}

.channels h3 {
  margin-bottom: 10px;
  font-size: 14px;
  color: #aaa;
}

.channel {
  padding: 8px;
  border-radius: 5px;
  cursor: pointer;
  color: #ccc;
}

.channel:hover {
  background: #3a3c41;
  color: #fff;
}

/* Chat */
.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat-header {
  padding: 15px;
  background: #2b2d31;
  border-bottom: 1px solid #1e1f22;
  font-weight: bold;
}

.messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.message {
  margin-bottom: 12px;
}

.message span {
  font-weight: bold;
  margin-right: 5px;
}

.input-area {
  display: flex;
  padding: 15px;
  background: #2b2d31;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 5px;
  border: none;
  outline: none;
  background: #383a40;
  color: white;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 5px;
  background: #5865f2;
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="servers">
  <div class="server">R</div>
  <div class="server">A</div>
</div>

<div class="channels">
  <h3>CANAIS</h3>
  <div class="channel"># geral</div>
  <div class="channel"># ia</div>
  <div class="channel"># projetos</div>
</div>

<div class="chat">
  <div class="chat-header">
    # geral
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Enviar mensagem...">
    <button onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script>
function sendMessage() {
  const input = document.getElementById("input");
  const messages = document.getElementById("messages");

  if (input.value.trim() === "") return;

  const msg = document.createElement("div");
  msg.classList.add("message");
  msg.innerHTML = "<span>Você:</span>" + input.value;

  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;

  input.value = "";
}
</script>

</body>
</html>
